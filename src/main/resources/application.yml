spring:
  application:
    name: eventhub

  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT}/${DB}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: localhost:${KAFKA_PORT}

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration



server:
  port: ${SERVER_PORT}
